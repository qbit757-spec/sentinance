version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: finanzas_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finanzas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finanzas_pass123}
      POSTGRES_DB: ${POSTGRES_DB:-finanzas_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finanzas_backend
    restart: always
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-finanzas_user}:${POSTGRES_PASSWORD:-finanzas_pass123}@db:5432/${POSTGRES_DB:-finanzas_db}
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-in-production-12345}
      - PROJECT_NAME=${PROJECT_NAME:-Finanzas Pro API}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
